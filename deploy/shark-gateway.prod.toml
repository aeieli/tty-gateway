# shark-gateway 生产配置（由 prod-build.sh 挂载到 /etc/shark-gateway/shark-gateway.toml）

# QUIC 端点绑定的 UDP 套接字（容器内）。Traefik shark-udp 入口会把 :4433/udp
# 透传到这里。
listen = "0.0.0.0:4433"

# TLS 证书（PEM）。客户端会 pin 这个证书的主机名。
# 把 tty-api.safafish.com 的证书/私钥放到 deploy/tls/ 下，prod-build.sh 会挂载到
# /etc/shark-gateway/tls。两行都留空（注释掉）时网关会生成自签证书（仅用于开发）。
# tls_cert = "/etc/shark-gateway/tls/cert.pem"
# tls_key  = "/etc/shark-gateway/tls/key.pem"

# 控制面（cloud-api）基址。网关据此鉴权（/v1/authorize）并回传会话/用量
# （/v1/sessions/*、/v1/usage）。指向同一内部网络（ttynet）上的 cloud-api。
control_plane_url = "http://cloud-api:8080"

# 注意：网关 <-> 控制面 的共享密钥 **不写在本文件**（本仓库为公开 AGPL 仓库）。
# 它通过环境变量 SHARK_GATEWAY_KEY 注入，由 prod-build.sh 从 gitignored 的
# deploy/secret.env 读取，必须与 cloud-api 的 security.gateway_key 一致。
